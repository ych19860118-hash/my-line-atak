<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>類 ATAK 地圖 (多圖形同步版)</title>
    <link rel="stylesheet" href="/node_modules/leaflet/dist/leaflet.css" />
    <script src="/node_modules/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="/node_modules/@geoman-io/leaflet-geoman-free/dist/leaflet-geoman.css" />
    <script src="/node_modules/@geoman-io/leaflet-geoman-free/dist/leaflet-geoman.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html, #map { margin: 0; padding: 0; height: 100%; width: 100%; background: #f0f0f0; }
        #info-box { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-family: sans-serif; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info-box">類 ATAK 測試：請點擊左側工具列開始畫圖</div>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([23.6, 121.0], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        map.pm.addControls({ position: 'topleft', drawMarker: true, drawPolyline: true, drawRectangle: true, drawPolygon: true, drawCircle: true, removalMode: true });
        const socket = io();

        // 【發送端】偵測畫圖類型並打包完整形狀
        map.on('pm:create', (e) => {
            const layer = e.layer;
            const shapeType = e.shape; 
            let shapeData = {};

            if (shapeType === 'Circle') {
                shapeData = {
                    type: 'Circle',
                    center: [layer.getLatLng().lat, layer.getLatLng().lng],
                    radius: layer.getRadius()
                };
            } else if (shapeType === 'Marker') {
                shapeData = {
                    type: 'Marker',
                    latlng: [layer.getLatLng().lat, layer.getLatLng().lng]
                };
            } else if (shapeType === 'Line' || shapeType === 'Polyline') {
                shapeData = {
                    type: 'Line',
                    latlngs: layer.getLatLngs().map(p => [p.lat, p.lng])
                };
            } else if (shapeType === 'Rectangle' || shapeType === 'Polygon') {
                shapeData = {
                    type: shapeType,
                    latlngs: layer.getLatLngs()[0].map(p => [p.lat, p.lng])
                };
            }

            socket.emit('draw_shape', shapeData);
        });

        // 【接收端】根據不同的形狀用專屬的指令還原出來
        socket.on('receive_shape', (data) => {
            let newLayer;
            const styleOptions = { color: '#ff1744', weight: 4, fillColor: '#ff1744', fillOpacity: 0.2 };

            if (data.type === 'Circle') {
                newLayer = L.circle(data.center, { radius: data.radius, ...styleOptions });
            } else if (data.type === 'Marker') {
                newLayer = L.marker(data.latlng);
            } else if (data.type === 'Line') {
                newLayer = L.polyline(data.latlngs, styleOptions);
            } else if (data.type === 'Rectangle') {
                newLayer = L.rectangle(data.latlngs, styleOptions);
            } else if (data.type === 'Polygon') {
                newLayer = L.polygon(data.latlngs, styleOptions);
            }

            if (newLayer) {
                newLayer.addTo(map);
                document.getElementById('info-box').innerText = `系統提示：收到隊友畫的 [${data.type}] 戰術圖形！`;
            }
        });
    </script>
</body>
</html>
