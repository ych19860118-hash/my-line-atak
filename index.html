<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>類 ATAK 戰術圖像平台 (完全內置版)</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0d1117; color: #fff; overflow: hidden; }
        
        /* 🌟 核心：全內置軍規戰術雷達網格背景，完全不依賴任何外部網址與圖片下載 */
        #tactical-grid {
            width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1;
            background-color: #0b0e14;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.08) 1px, transparent 1px);
            background-size: 50px 50px; background-position: center;
        }
        
        #status-bar {
            position: absolute; top: 10px; left: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); color: #00ff00; border: 1px solid #00ff00;
            padding: 8px 15px; border-radius: 5px; font-size: 14px; font-family: monospace;
        }
        
        .control-panel {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 250px;
        }
        
        label { color: #58a6ff; display: block; margin-bottom: 5px; font-size: 13px; }
        select, input { margin: 5px 0 12px 0; display: block; width: 100%; padding: 8px; box-sizing: border-box; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 6px; }
        
        /* 戰術圖標樣式 */
        .tactical-marker {
            position: absolute; width: 24px; height: 24px; transform: translate(-50%, -50%);
            border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4);
            cursor: pointer; z-index: 5; text-align: center; line-height: 20px; font-weight: bold; font-size: 12px;
        }
        
        .marker-label {
            position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 2px 6px; border-radius: 4px;
            font-size: 11px; white-space: nowrap; border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <!-- 戰術狀態列 -->
    <div id="status-bar">SYS_STATUS: LAUNCHING...</div>

    <!-- 戰術控制面板 -->
    <div class="control-panel">
        <label><b>ATAK 戰術標記工具</b></label>
        <select id="marker-type">
            <option value="friendly">🔵 友軍位置 (Friendly)</option>
            <option value="hostile">🔴 敵軍/威脅 (Hostile)</option>
            <option value="infantry">⚔️ 任務目標 (Objective)</option>
        </select>
        <label><b>標記名稱</b></label>
        <input type="text" id="marker-label" placeholder="輸入標記名稱 (如: 指揮所)">
        <small style="color: #8b949e; font-size: 11px;">提示：設定後，直接點擊螢幕雷達任意位置即可即時部署圖標</small>
    </div>

    <!-- 完全內置的雷達網格容器 -->
    <div id="tactical-grid"></div>

    <script>
        // 1. 解析網址房號
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'public_lobby';
        document.getElementById('status-bar').innerText = `🎯 TACTICAL_ROOM: ${roomId} [CONNECTED]`;

        const gridContainer = document.getElementById('tactical-grid');

        // 2. 自動辨識當前網域建立 WebSocket 實時通訊
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const socket = new WebSocket(`${protocol}${window.location.host}`);

        socket.onopen = () => {
            socket.send(JSON.stringify({ action: 'join', room_id: roomId }));
        };

        socket.onmessage = (event) => {
            const parsed = JSON.parse(event.data);
            
            // 進入房間時載入該房間歷史標記
            if (parsed.action === 'init') {
                document.querySelectorAll('.tactical-marker').forEach(m => m.remove());
                parsed.data.forEach(item => drawTacticalMarker(item));
            }

            // 接收同房間其他成員的即時戰術廣播
            if (parsed.action === 'broadcast_marker') {
                drawTacticalMarker(parsed.data);
            }
        };

        // 3. 繪製完全內置的戰術圖標 (免載入外部任何資源)
        function drawTacticalMarker(data) {
            const marker = document.createElement('div');
            marker.className = 'tactical-marker';
            
            if (data.type === 'friendly') { marker.style.backgroundColor = '#1f6feb'; marker.innerText = 'F'; }
            if (data.type === 'hostile') { marker.style.backgroundColor = '#da3633'; marker.innerText = 'H'; }
            if (data.type === 'infantry') { marker.style.backgroundColor = '#238636'; marker.innerText = 'O'; }

            // 座標百分比定位，防止不同解析度跑位
            marker.style.left = data.lng + 'px';
            marker.style.top = data.lat + 'px';

            // 戰術名稱標籤
            const labelSpan = document.createElement('span');
            labelSpan.className = 'marker-label';
            labelSpan.innerText = data.label || '未命名標記';
            marker.appendChild(labelSpan);

            gridContainer.appendChild(marker);
        }

        // 4. 監聽點擊事件部署標記
        gridContainer.onmousedown = (e) => {
            if (e.target.id !== 'tactical-grid') return;

            const type = document.getElementById('marker-type').value;
            const label = document.getElementById('marker-label').value || '未命名標記';
            
            // 抓取當下滑鼠點擊的絕對座標
            const lat = e.clientY;
            const lng = e.clientX;

            const markerData = { type, lat, lng, label };

            // 透過 WebSocket 隔離轉發
            socket.send(JSON.stringify({
                action: 'add_marker',
                data: markerData
            }));

            drawTacticalMarker(markerData);
            document.getElementById('marker-label').value = '';
        };
    </script>
</body>
</html>
