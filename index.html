<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>類 ATAK 戰術圖像平台 (台灣離線地圖完全體)</title>
    
    <!-- 讀取專案內部建立的地圖大腦與樣式檔案，破除外部跨網域攔截 -->
    <link rel="stylesheet" href="/leaflet.css" />
    <script src="/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0d1117; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
        #status-bar {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); color: #00ff00; border: 1px solid #00ff00;
            padding: 8px 15px; border-radius: 5px; font-size: 14px; font-family: monospace;
        }
        .control-panel {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 250px; color: white;
        }
        select, input, button { margin: 5px 0; display: block; width: 100%; padding: 8px; box-sizing: border-box; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 6px; }
    </style>
</head>
<body>

    <!-- 狀態列 -->
    <div id="status-bar">正在安全建立戰術加密通道...</div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <label><b>ATAK 戰術標記工具</b></label>
        <select id="marker-type">
            <option value="friendly">🔵 友軍位置 (Friendly)</option>
            <option value="hostile">🔴 敵軍/威脅 (Hostile)</option>
            <option value="infantry">⚔️ 任務目標 (Objective)</option>
        </select>
        <input type="text" id="marker-label" placeholder="輸入標記名稱">
        <small style="color: #8b949e;">提示：設定後點擊地圖任意位置即可部署標記</small>
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <script>
        function checkAndInit() {
            if (typeof L !== 'undefined') {
                initTacticalMap();
            } else {
                setTimeout(checkAndInit, 1000);
            }
        }

        function initTacticalMap() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room') || 'public_lobby';
            document.getElementById('status-bar').innerText = `🎯 TACTICAL_ROOM: ${roomId} [OFFLINE_TAIWAN_MAP]`;

            // 🌟 將地圖中心點精準鎖定在台灣中央（南投/台中交界）
            const map = L.map('map').setView([23.6, 121.0], 8);
            
            // 🌟 核心修正：將地圖圖片路徑直接連到你剛剛在自己專案建立的 /tiles/ 資料夾！
            // 100% 免網際網路下載，徹底封印任何外部 CORS 404 與逾時錯誤！
            L.tileLayer('/tiles/{z}/{x}/{y}.png', {
                maxZoom: 10,
                minZoom: 7,
                attribution: '© Offline Taiwan Tactical Maps'
            }).addTo(map);

            const markerGroup = L.layerGroup().addTo(map);

            // 自動辨識當前網域建立 WebSocket 實時通訊
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const socket = new WebSocket(`${protocol}${window.location.host}`);

            socket.onopen = () => {
                socket.send(JSON.stringify({ action: 'join', room_id: roomId }));
            };

            socket.onmessage = (event) => {
                const parsed = JSON.parse(event.data);
                if (parsed.action === 'init') {
                    markerGroup.clearLayers();
                    parsed.data.forEach(item => drawMarker(item));
                }
                if (parsed.action === 'broadcast_marker') {
                    drawMarker(parsed.data);
                }
            };

            function drawMarker(data) {
                let color = 'blue';
                if (data.type === 'hostile') color = 'red';
                if (data.type === 'infantry') color = 'green';

                const marker = L.circleMarker([data.lat, data.lng], {
                    radius: 10,
                    fillColor: color,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(markerGroup);

                marker.bindPopup(`<b>${data.label || '未命名標記'}</b><br>類型: ${data.type}`);
            }

            map.on('click', (e) => {
                const type = document.getElementById('marker-type').value;
                const label = document.getElementById('marker-label').value || '未命名標記';
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;

                const markerData = { type, lat, lng, label };

                socket.send(JSON.stringify({
                    action: 'add_marker',
                    data: markerData
                }));

                drawMarker(markerData);
                document.getElementById('marker-label').value = '';
            });
        }

        window.onload = checkAndInit;
    </script>
</body>
</html>
